name: Build APK with Docker (fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = Food Factory
package.name = foodfactory
package.domain = org.example
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0.0
requirements = python3,kivy==2.1.0,requests
orientation = portrait
fullscreen = 0
android.permissions = INTERNET
android.api = 30
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a
log_level = 2
warn_on_root = 0
EOF

    - name: Build APK with Docker (bypass root check)
      run: |
        docker run --rm \
          -v $(pwd):/app \
          -w /app \
          -e BUILDOZER_IGNORE_ROOT=1 \
          kivy/buildozer:latest \
          bash -c "buildozer init && sed -i 's/check_root/pass # check_root/' /home/user/.venv/lib/python3.12/site-packages/buildozer/__init__.py && buildozer android debug"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: foodfactory-apk
        path: bin/*.apk
