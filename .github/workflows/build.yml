name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build APK
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk
          pip install buildozer cython
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: app
          path: bin/*.apk
