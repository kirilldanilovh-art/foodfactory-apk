name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build APK with Docker
      run: |
        docker run --rm \
          -v $(pwd):/app \
          -w /app \
          kivy/buildozer:latest \
          bash -c "echo y | buildozer init && echo y | buildozer android debug"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: foodfactory-apk
        path: bin/*.apk
