name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Install buildozer
      run: |
        pip install buildozer cython

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]

title = Food Factory
package.name = foodfactory
package.domain = org.example

source.dir = .
source.include_exts = py,png,jpg,kv,atlas

version = 1.0.0
requirements = python3,kivy==2.1.0,requests

orientation = portrait
fullscreen = 0

android.permissions = INTERNET

android.api = 30
android.minapi = 21
android.ndk = 25b

android.archs = arm64-v8a

log_level = 2
warn_on_root = 0
EOF

    - name: Build APK (no prompts)
      run: |
        yes | buildozer android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: foodfactory-apk
        path: bin/*.apk
