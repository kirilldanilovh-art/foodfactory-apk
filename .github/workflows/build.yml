name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        timeout 30m bash -c '
        for i in 1 2 3; do
          echo "Attempt $i: installing dependencies..."
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev && break || sleep 10
        done'
